<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exercicio 10 - useRef</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState } = React;

    function Exercicio10UseRef() {
      const raioMaiorRef = useRef(null);
      const raioMenorRef = useRef(null);
      const [area, setArea] = useState(0);

      const calcularArea = () => {
        const raioMaior = Number(raioMaiorRef.current.value);
        const raioMenor = Number(raioMenorRef.current.value);

        if (raioMaior > 0 && raioMenor > 0) {
          const resultado = raioMaior * raioMenor * Math.PI;
          setArea(resultado);
        } else {
          setArea(0);
        }
      };

      return (
        <div>
          <h1>Cálculo da área de uma elipse (useRef)</h1>
          <form onSubmit={(e) => e.preventDefault()}>
            <div>
              <label>
                <span>Medida do raio maior:</span><br />
                <input type="number" ref={raioMaiorRef} onChange={calcularArea} />
              </label>
            </div>
            <div>
              <label>
                <span>Medida do raio menor:</span><br />
                <input type="number" ref={raioMenorRef} onChange={calcularArea} />
              </label>
            </div>
            <div id="resultado">
              {area > 0 && (
                <p>Área: {area.toLocaleString('pt-BR', { minimumFractionDigits: 4, maximumFractionDigits: 4 })}</p>
              )}
            </div>
          </form>
        </div>
      );
    }

    // Iniciando o React na div "root"
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Exercicio10UseRef />);
  </script>
</body>
</html>
