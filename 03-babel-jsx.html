<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        .formata {
            font-family: Consolas, monospace;
            color: blue;
            background: powderblue;
            text-align: center;
            margin-bottom: 15px;
            border: 2px solid blue;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>
<!-- Scripts para carregar remotamente o React e o Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>


  <div id="root"></div>

        <script type="text/babel">

        // Div criada com react "cru", como no arquivo anterior
        const div1 = React.createElement(
            'div',                          
            {id: 'div1', className: 'formata'},
            'Div criada com react "cru"'    
        )   

        // Div criada com a sintaxe JSX, a qual será processada pelo Babel
        // e transpilada para JS puro
        const div2 = <div id="div2" className="formata">Div criada com JSX</div>

        // Para exibir o conteúdo de variaveis, dentro do JSX , usamos {}.
        // Isso se chama interpolação de variáveis.
        const nomeClasse = 'formata '
        const id = 'div3'
        const conteudo = 'DIV criada com JSX+Babel e interpolação de variáveis'

        const div3 = <div id={id} className={nomeClasse}>{conteudo}</div>

        // Criando um objeto de props (em vez de variáveis avulsas, como fizemos 
        // na div3)
        const propsDiv4 = {
            id: 'div4',
            className: 'formata',
            children: 'DIV criada com JSX+Babel e espelhamento de props'
        }

        //Usando espelhamento para informar os props
        // Em JSX, quando não temos a tag de fechamento, é OBRIGATORIO terminar o 
        // elemento usando />
        const div4 = <div {...propsDiv4} />

        // Container
        //const container = React.createElement(
        //    'div',
        //     { id : 'container', children: [div1, div2, div3, div4] }
        // )
        
        // Container em JSX
        const container = 
            <div id='container' style={{border:'1px dotted red'}}>
                {div1} {div2} {div3} {div4}
            </div>    

        // Tornando a DIV root nosso ponto de inserção
        const root = ReactDOM.createRoot(document.getElementById('root'))

        // Renderizando o container com tudo dentro

        root.render(container)
        
        
        </script>
</body>
</html>
