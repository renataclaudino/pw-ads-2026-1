     <body>
<!-- Scripts para carregar remotamente o React e o Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
     <div id = "root"></div>    
     <script type = "text/label">
        /* PROPS GENÉRICAS E PROPS PERSONALIZADAS
        Uma função de componentes em react pode receber dois tipos de promps:
        1. genericas: sao passadas por meio de um unico objeto e normamente são aplicadas no componente por meio de espalhamento
        2. props personalizadas: são pasasdas normalmente a função.
        Somente os props nomeados explicitamente são processadas dentro do componente.
        */

        //função de componente que recebe props genericas
        function Mensagem(props){
            return <div className = "msg"> {props.texto} </div>
        }
        //Função de componente que recebe apenas props personalizadas
        const Aviso = ([id, children]) = > <div className = "msg" id = {id}> {children} </div>


        const propsMs1 = {
            id: 'msg1',
            title: 'Primeira mensagem',
            children: 'Atenção: chão escorregadio!',
            propFicticia: 'Teste',
            x: 'y'
        }
        const container = 
        <>
        /*Um componente pode ser criado diretamente dentro do container,*/
        <mensagem> ...propsMsg1>
            </>
            const root = REactDOM.createRoot(document.getElementById('root'))
            root.render(container)
     </script>

const container = 
<>
{/*Um componente pode ser criado diretamente dentro do container,*/
<mensagem{...propsMsg1}>
{/* no componente mensagem abaixo, todas as props serão recebidas e processadas, uma vez que o componente recebe props genéricas}
}
