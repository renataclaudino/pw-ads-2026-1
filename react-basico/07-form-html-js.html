<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>FORMULÁRIO HTML + JS</h1>
  <form onsubmit="handleSubmit(event)">
    <div>
      <label>
        <span>Nome:</span>
        <input id="campo-nome" oninput="handleChange(event)">
      </label>
    </div>
    <div>
      <label>
        <input type="checkbox" id="maiusc" oninput="handleChange(event)">
        <span>Colocar o nome em maiúsculas</span>
      </label>
    </div>
    <div id="resultado"></div>
    <div>
      <button type="submit">Enviar</button>
    </div>
  </form>

  <script>
    let nome, maiusc

    function handleChange(event) {
      maiusc = document.getElementById('maiusc').checked

      nome = maiusc
        ? document.getElementById('campo-nome').value.toUpperCase()
        : document.getElementById('campo-nome').value

      document.getElementById('resultado').textContent = nome
    }

    function handleSubmit(event) {
      event.preventDefault()    // Evita o recarregamento da página
      alert(`Olá, ${nome}!`)
    }
  </script>
 
</body>
</html>
